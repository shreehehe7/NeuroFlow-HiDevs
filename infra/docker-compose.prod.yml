services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: mysecretpassword
    deploy:
      resources:
        limits: {memory: 2g, cpus: '2.0'}
    restart: unless-stopped

  redis:
    image: redis:7
    deploy:
      resources:
        limits: {memory: 512m, cpus: '0.5'}
    restart: unless-stopped

  api:
    build:
      context: ../backend
      target: runtime
    deploy:
      replicas: 2
      resources:
        limits: {memory: 1g, cpus: '1.0'}
    restart: unless-stopped
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]

  worker:
    build:
      context: ../backend
      target: runtime
    command: uvicorn main:app # Mocked worker command
    deploy:
      replicas: 2
      resources:
        limits: {memory: 2g, cpus: '2.0'}  # Workers need more for ML models
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api]
