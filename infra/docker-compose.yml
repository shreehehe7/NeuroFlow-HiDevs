services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neuroflow
      POSTGRES_USER: neuroflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "neuroflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts "mlflow,localhost,*" --backend-store-uri postgresql://neuroflow:${POSTGRES_PASSWORD}@postgres:5432/mlflow
    ports: ["5000:5000"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ../backend
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file: ../.env
    volumes:
      - upload_data:/app/uploads

  worker:
    build: ../backend
    command: python -m worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env
    volumes:
      - upload_data:/app/uploads

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports: ["16686:16686", "4317:4317"]

volumes:
  postgres_data:
  upload_data:
