on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ghcr.io/shreehehe7/neuroflow-hidevs/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Also scan with Trivy
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/shreehehe7/neuroflow-hidevs/api:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL
