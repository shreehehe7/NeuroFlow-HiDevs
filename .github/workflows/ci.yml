jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install ruff mypy
      - run: ruff check backend/
      - run: mypy backend/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: {POSTGRES_PASSWORD: testpassword, POSTGRES_DB: neuroflow_test}
      redis:
        image: redis:7-alpine
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r backend/requirements.txt
      - run: pytest tests/unit/ -v --cov=backend --cov-report=xml
      - uses: codecov/codecov-action@v4
        with: {file: coverage.xml}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install detect-secrets pip-audit
      - run: detect-secrets-hook --baseline .secrets.baseline $(git diff --name-only HEAD~1)
      - run: pip-audit -r backend/requirements.txt
      - run: npm audit --prefix frontend --audit-level=high
