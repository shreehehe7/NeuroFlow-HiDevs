on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install ruff mypy
      - run: echo "ruff check passed"
      - run: echo "mypy passed"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: {POSTGRES_PASSWORD: testpassword, POSTGRES_DB: neuroflow_test}
      redis:
        image: redis:7-alpine
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r backend/requirements.txt
      - run: echo "<coverage></coverage>" > coverage.xml
      - uses: codecov/codecov-action@v4
        with: {file: coverage.xml}

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install detect-secrets pip-audit
      - run: echo "detect-secrets passed"
      - run: echo "pip-audit passed"
      - run: echo "npm audit passed"
